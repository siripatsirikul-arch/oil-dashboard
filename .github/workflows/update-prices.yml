name: Update Oil Prices

on:
  # รันอัตโนมัติทุก 6 ชั่วโมง (UTC) → ตรงกับ 07:00, 13:00, 19:00, 01:00 น. ไทย
  schedule:
    - cron: "0 0,6,12,18 * * *"

  # รันด้วยมือได้จาก GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ต้องการ permission นี้เพื่อ commit กลับ

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. ติดตั้ง Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. ติดตั้ง dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. รัน scraper
      - name: Scrape oil prices
        run: python scripts/scrape.py

      # 5. Commit ไฟล์ data/prices.json กลับ repo
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          # commit เฉพาะถ้ามีการเปลี่ยนแปลง
          git diff --staged --quiet || git commit -m "data: update oil prices $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
