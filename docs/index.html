<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ราคาน้ำมัน Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #13161d; --surface2: #1a1e28;
    --border: rgba(255,255,255,0.07); --text: #e8eaf0; --muted: #6b7280;
    --danger: #ef5350; --warn: #ffa726; --safe: #26a69a; --wti: #42a5f5;
  }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 14px; min-height: 100vh; padding: 24px 20px 60px; }

  /* Header */
  .header { margin-bottom: 24px; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 6px; }
  h1 { font-size: 22px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .badge-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border); }
  .badge-live { background: rgba(38,166,154,0.15); border-color: rgba(38,166,154,0.4); color: var(--safe); }
  .badge-time { background: var(--surface); color: var(--muted); }
  .subtitle { font-size: 13px; color: var(--muted); }

  /* Loading / error */
  .state-box { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--safe); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .metric-value { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
  .metric-sub { font-size: 11px; color: var(--muted); }
  .c-red { color: var(--danger); } .c-green { color: var(--safe); } .c-warn { color: var(--warn); } .c-blue { color: var(--wti); }

  /* Controls row: tabs + period picker */
  .controls { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); padding: 4px; border-radius: 8px; }
  .tab { padding: 7px 16px; border-radius: 5px; font-size: 13px; font-family: 'IBM Plex Sans Thai', sans-serif; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all 0.15s; }
  .tab.active { background: var(--surface2); color: #fff; border: 1px solid var(--border); }
  .tab:hover:not(.active) { color: var(--text); }

  /* Period picker */
  .period-picker { display: flex; gap: 4px; }
  .period-btn { padding: 6px 12px; border-radius: 5px; font-size: 12px; font-family: 'IBM Plex Mono', monospace; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted); transition: all 0.15s; }
  .period-btn.active { background: var(--surface2); color: #fff; border-color: rgba(255,255,255,0.15); }
  .period-btn:hover:not(.active) { color: var(--text); }

  /* Panels */
  .panel { display: none; } .panel.active { display: block; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .chart-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .chart-desc { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .chart-wrap { position: relative; width: 100%; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  @media (max-width: 500px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .controls { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>ราคาน้ำมัน Live</h1>
    <div class="badge-row">
      <span class="badge badge-live">● LIVE</span>
      <span class="badge badge-time" id="updated-at">กำลังโหลด...</span>
    </div>
  </div>
  <div class="subtitle">ราคาน้ำมันดิบโลก vs ราคาหน้าปั๊มไทย · อัพเดทอัตโนมัติทุก 6 ชั่วโมง</div>
</div>

<div class="state-box" id="loading">
  <div class="spinner"></div>
  <div>กำลังโหลดข้อมูลราคาน้ำมัน...</div>
</div>

<div id="app" style="display:none;">
  <div class="metrics" id="metrics"></div>

  <div class="controls">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('global',this)">น้ำมันดิบโลก</button>
      <button class="tab" onclick="switchTab('thai',this)">ราคาปั๊มไทย</button>
    </div>
    <div class="period-picker" id="period-picker">
      <button class="period-btn" onclick="setPeriod(7,this)">7วัน</button>
      <button class="period-btn" onclick="setPeriod(30,this)">30วัน</button>
      <button class="period-btn active" onclick="setPeriod(90,this)">90วัน</button>
      <button class="period-btn" onclick="setPeriod(180,this)">180วัน</button>
      <button class="period-btn" onclick="setPeriod(0,this)">ทั้งหมด</button>
    </div>
  </div>

  <!-- Tab 1: Global -->
  <div class="panel active" id="panel-global">
    <div class="chart-card">
      <div class="chart-title">ราคาน้ำมันดิบโลก (USD/บาร์เรล)</div>
      <div class="chart-desc" id="global-desc">—</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#ef5350;"></div>Brent Crude</div>
        <div class="legend-item"><div class="legend-dot" style="background:#42a5f5;"></div>WTI</div>
        <div class="legend-item"><div class="legend-dot" style="background:#78909c;"></div>Dubai (อ้างอิงโรงกลั่นไทย)</div>
      </div>
      <div class="chart-wrap"><canvas id="globalChart" height="280"></canvas></div>
    </div>
  </div>

  <!-- Tab 2: Thai pump -->
  <div class="panel" id="panel-thai">
    <div class="chart-card">
      <div class="chart-title">ราคาน้ำมันหน้าปั๊มไทย (บาท/ลิตร)</div>
      <div class="chart-desc" id="thai-desc">—</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#26a69a;"></div>ดีเซล B7</div>
        <div class="legend-item"><div class="legend-dot" style="background:#5c6bc0;"></div>แก๊สโซฮอล์ 95</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ab47bc;"></div>แก๊สโซฮอล์ 91</div>
        <div class="legend-item"><div class="legend-dot" style="background:#66bb6a;"></div>E20</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffa726;"></div>เบนซิน 95</div>
      </div>
      <div class="chart-wrap"><canvas id="thaiChart" height="300"></canvas></div>
    </div>
  </div>
</div>

<script>
const C = {
  grid:  'rgba(255,255,255,0.05)',
  tick:  '#6b7280',
  tt_bg: '#1a1e28',
  tt_bd: 'rgba(255,255,255,0.1)',
};

Chart.defaults.color = C.tick;
Chart.defaults.font.family = "'IBM Plex Sans Thai', sans-serif";
Chart.defaults.font.size = 11;

let charts = {};
let allData = null;
let currentPeriod = 90;

async function loadData() {
  const res = await fetch('data/prices.json?t=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── Filter history by period (days), 0 = all ──────────────────────────────
function filterHistory(history, days) {
  if (!days || days === 0) return history;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  return history.filter(h => h.date >= cutoffStr);
}

// ── Format date label ─────────────────────────────────────────────────────
function fmtDate(dateStr, totalPoints) {
  const d = new Date(dateStr);
  if (totalPoints <= 60) {
    return (d.getMonth()+1) + '/' + String(d.getDate()).padStart(2,'0');
  }
  // ถ้าข้อมูลเยอะ แสดงเดือน/ปี
  return (d.getMonth()+1) + '/' + String(d.getFullYear()).slice(2);
}

// ── Render charts with given history slice ────────────────────────────────
function renderCharts(history) {
  const n = history.length;
  const labels   = history.map(h => fmtDate(h.date, n));
  const brentArr = history.map(h => h.global?.brent   ?? null);
  const wtiArr   = history.map(h => h.global?.wti     ?? null);
  const dubaiArr = history.map(h => h.global?.dubai   ?? null);
  const dieselArr = history.map(h => h.thai?.diesel_b7 ?? null);
  const gsh95Arr  = history.map(h => h.thai?.gsh95    ?? null);
  const gsh91Arr  = history.map(h => h.thai?.gsh91    ?? null);
  const e20Arr    = history.map(h => h.thai?.e20       ?? null);
  const benzinArr = history.map(h => h.thai?.benzin95  ?? null);

  const first = history[0]?.date ?? '';
  const last  = history[n-1]?.date ?? '';
  const rangeLabel = n > 0 ? `${first} → ${last} (${n} จุดข้อมูล)` : '—';
  document.getElementById('global-desc').textContent = rangeLabel;
  document.getElementById('thai-desc').textContent   = rangeLabel;

  const ttOpts = {
    backgroundColor: C.tt_bg, borderColor: C.tt_bd, borderWidth: 1,
    titleColor: '#e8eaf0', bodyColor: '#9ca3af'
  };
  const xOpts = { grid: { display: false }, ticks: { maxRotation: 45, autoSkip: true, maxTicksLimit: 14 }};

  // Chart 1: Global
  if (charts.global) charts.global.destroy();
  charts.global = new Chart(document.getElementById('globalChart'), {
    type: 'line',
    data: { labels, datasets: [
      { label: 'Brent', data: brentArr, borderColor: '#ef5350', backgroundColor: 'rgba(239,83,80,0.08)', fill: true,  tension: 0.35, pointRadius: n > 60 ? 0 : 2, borderWidth: 2.5 },
      { label: 'WTI',   data: wtiArr,   borderColor: '#42a5f5', backgroundColor: 'rgba(66,165,245,0.05)', fill: true,  tension: 0.35, pointRadius: n > 60 ? 0 : 2, borderWidth: 2 },
      { label: 'Dubai', data: dubaiArr,  borderColor: '#78909c', backgroundColor: 'transparent',           fill: false, tension: 0.35, pointRadius: 0, borderWidth: 1.5, borderDash: [5,4] },
    ]},
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { ...ttOpts, callbacks: { label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y?.toFixed(2) ?? '-'}` }}},
      scales: { y: { grid: { color: C.grid }, ticks: { callback: v => '$'+v }}, x: xOpts }
    }
  });

  // Chart 2: Thai
  if (charts.thai) charts.thai.destroy();
  charts.thai = new Chart(document.getElementById('thaiChart'), {
    type: 'line',
    data: { labels, datasets: [
      { label: 'ดีเซล B7',   data: dieselArr, borderColor: '#26a69a', backgroundColor: 'rgba(38,166,154,0.08)', fill: true,  tension: 0, pointRadius: n > 60 ? 0 : 2, borderWidth: 3 },
      { label: 'GSH 95',     data: gsh95Arr,  borderColor: '#5c6bc0', backgroundColor: 'transparent',           fill: false, tension: 0.3, pointRadius: n > 60 ? 0 : 2, borderWidth: 2 },
      { label: 'GSH 91',     data: gsh91Arr,  borderColor: '#ab47bc', backgroundColor: 'transparent',           fill: false, tension: 0.3, pointRadius: n > 60 ? 0 : 2, borderWidth: 2 },
      { label: 'E20',        data: e20Arr,    borderColor: '#66bb6a', backgroundColor: 'transparent',           fill: false, tension: 0.3, pointRadius: n > 60 ? 0 : 2, borderWidth: 1.5, borderDash: [4,3] },
      { label: 'เบนซิน 95',  data: benzinArr, borderColor: '#ffa726', backgroundColor: 'transparent',           fill: false, tension: 0.3, pointRadius: n > 60 ? 0 : 2, borderWidth: 2 },
    ]},
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { ...ttOpts, callbacks: { label: ctx => ` ${ctx.dataset.label}: ฿${ctx.parsed.y?.toFixed(2) ?? '-'}` }}},
      scales: { y: { min: 15, max: 60, grid: { color: C.grid }, ticks: { callback: v => '฿'+v }}, x: xOpts }
    }
  });
}

// ── Render metric cards (always from latest) ──────────────────────────────
function renderMetrics(latest) {
  const b  = latest.global?.brent    ?? '-';
  const w  = latest.global?.wti      ?? '-';
  const d  = latest.thai?.diesel_b7  ?? '-';
  const g95 = latest.thai?.gsh95     ?? '-';
  const g91 = latest.thai?.gsh91     ?? '-';
  const e20 = latest.thai?.e20       ?? '-';
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Brent Crude</div>
      <div class="metric-value c-red">$${b}</div><div class="metric-sub">USD/บาร์เรล</div></div>
    <div class="metric"><div class="metric-label">WTI</div>
      <div class="metric-value c-blue">$${w}</div><div class="metric-sub">USD/บาร์เรล</div></div>
    <div class="metric"><div class="metric-label">ดีเซล B7</div>
      <div class="metric-value c-green">฿${d}</div><div class="metric-sub">บาท/ลิตร</div></div>
    <div class="metric"><div class="metric-label">แก๊สโซฮอล์ 95</div>
      <div class="metric-value" style="color:#5c6bc0;">฿${g95}</div><div class="metric-sub">บาท/ลิตร</div></div>
    <div class="metric"><div class="metric-label">แก๊สโซฮอล์ 91</div>
      <div class="metric-value" style="color:#ab47bc;">฿${g91}</div><div class="metric-sub">บาท/ลิตร</div></div>
    <div class="metric"><div class="metric-label">E20</div>
      <div class="metric-value" style="color:#66bb6a;">฿${e20}</div><div class="metric-sub">บาท/ลิตร</div></div>
  `;
}

// ── Period switch ─────────────────────────────────────────────────────────
function setPeriod(days, btn) {
  currentPeriod = days;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (allData) renderCharts(filterHistory(allData.history, days));
}

// ── Tab switch ────────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── Boot ──────────────────────────────────────────────────────────────────
(async () => {
  try {
    allData = await loadData();
    const ts = new Date(allData.latest.updated_at);
    document.getElementById('updated-at').textContent =
      'อัพเดท ' + ts.toLocaleString('th-TH', { timeZone: 'Asia/Bangkok', dateStyle: 'short', timeStyle: 'short' });
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderMetrics(allData.latest);
    renderCharts(filterHistory(allData.history, currentPeriod));
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#ef5350;">⚠ โหลดข้อมูลไม่ได้: ${e.message}</div>
       <div style="margin-top:8px;font-size:12px;color:#6b7280;">ตรวจสอบว่าไฟล์ data/prices.json มีอยู่</div>`;
  }
})();
</script>
</body>
</html>
